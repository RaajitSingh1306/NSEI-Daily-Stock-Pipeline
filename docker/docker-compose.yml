x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1-python3.11
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: "t4JunVTMRuXMe0F2V8bejfsLn5Tqo03S-MqUwQxoHC8="
    AIRFLOW__WEBSERVER__SECRET_KEY: "nsei-local-dev-secret-key-replace-in-prod"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: "30"
    AWS_DEFAULT_REGION: ap-south-1
    AWS_ACCESS_KEY_ID: test
    AWS_SECRET_ACCESS_KEY: test
    AWS_ENDPOINT_URL: http://localstack:4566
    AIRFLOW_VAR_NSEI_S3_BUCKET: nsei-datalake
    AIRFLOW_VAR_DUCKDB_PATH: /opt/warehouse/nsei.duckdb
    AIRFLOW_VAR_SPARK_MASTER: "local[*]"
    AIRFLOW_VAR_NSEI_SYMBOLS: "RELIANCE,TCS,INFY,HDFCBANK,ICICIBANK,SBIN,BAJFINANCE,LT,HINDUNILVR,KOTAKBANK"
    PYTHONPATH: /opt/nsei_pipeline
  volumes: &airflow-vols
    - ../dags:/opt/airflow/dags
    - ../spark_jobs:/opt/nsei_pipeline/spark_jobs
    - ../dbt_project:/opt/nsei_pipeline/dbt_project
    - ../dbt_project/profiles.yml:/opt/dbt/profiles.yml
    - warehouse_vol:/opt/warehouse
    - ../logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
    localstack:
      condition: service_healthy

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_vol:/var/lib/postgresql/data

  localstack:
    image: localstack/localstack:3.4
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEFAULT_REGION: ap-south-1
    volumes:
      - ./localstack_init.sh:/etc/localstack/init/ready.d/init.sh
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  airflow-init:
    <<: *airflow-common
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    command:
      - bash
      - -c
      - |
        pip install --no-cache-dir --timeout 120 --ignore-installed "duckdb==1.2.2"
        pip install --no-cache-dir --timeout 120 \
          "pyspark==3.5.4" "dbt-duckdb==1.9.6" "yfinance" "s3fs" "boto3"
        airflow db init
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname User \
          --role Admin --email admin@example.com || true

  airflow-webserver:
    <<: *airflow-common
    command:
      - bash
      - -c
      - |
        pip install --no-cache-dir --timeout 120 --ignore-installed "duckdb==1.2.2"
        pip install --no-cache-dir --timeout 120 \
          "pyspark==3.5.4" "dbt-duckdb==1.9.6" "yfinance" "s3fs" "boto3"
        airflow webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

  airflow-scheduler:
    <<: *airflow-common
    command:
      - bash
      - -c
      - |
        pip install --no-cache-dir --timeout 120 --ignore-installed "duckdb==1.2.2"
        pip install --no-cache-dir --timeout 120 \
          "pyspark==3.5.4" "dbt-duckdb==1.9.6" "yfinance" "s3fs" "boto3"
        airflow scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

volumes:
  postgres_vol:
  warehouse_vol:
version: 2

sources:
  - name: raw
    schema: raw
    tables:
      - name: nsei_daily
        description: "Raw NSEI OHLCV data loaded from S3 processed layer"
        columns:
          - name: symbol
            tests: [not_null]
          - name: trade_date
            tests: [not_null]
          - name: close
            tests: [not_null]

models:
  - name: stg_nsei_daily
    description: "Typed, cleaned staging layer over raw.nsei_daily"
    columns:
      - name: symbol
        tests: [not_null]
      - name: trade_date
        tests: [not_null]
      - name: close_price
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: volume
        tests: [not_null]
      - name: high_price
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= low_price"